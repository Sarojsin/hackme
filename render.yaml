services:
  - type: web
    name: lifeos-backend
    plan: free
    env: docker
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: development
      - key: CORS_ORIGINS
        value: https://hackme-cdy9.onrender.com
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_MODEL
        value: llama-3.3-70b-versatile
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
